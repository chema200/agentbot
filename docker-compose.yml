version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: agentbot-db
    environment:
      POSTGRES_DB: agentbot
      POSTGRES_USER: agentbot
      POSTGRES_PASSWORD: agentbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentbot"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agentbot-net

  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: agentbot-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: agentbot
      DB_USER: agentbot
      DB_PASSWORD: agentbot
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agentbot-net

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    container_name: agentbot-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend
    networks:
      - agentbot-net

volumes:
  pgdata:

networks:
  agentbot-net:
    driver: bridge

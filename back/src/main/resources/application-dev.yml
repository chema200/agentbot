spring:
  datasource:
    url: jdbc:h2:mem:agentbot;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  h2:
    console:
      enabled: true
      path: /h2-console

polymarket:
  gamma-api-base: https://gamma-api.polymarket.com
  clob-api-base: https://clob.polymarket.com
  clob-ws-url: wss://ws-subscriptions-clob.polymarket.com/ws/market

shadow:
  enabled: true
  max-markets: 15
  refresh-interval-ms: 10000
  cycle-interval-ms: 3000
  max-capital-share-per-market: 0.25
  regime-penalty-calm: 1.0
  regime-penalty-normal: 0.8
  regime-penalty-volatile: 0.35
  regime-penalty-crisis: 0.0
  block-volatile-markets: false
  cooldown-cycles: 15
  min-edge-after-penalty: 0.02
  edge-clamp-min: 0.0
  edge-clamp-max: 1.0
  max-yes-exposure: 500.0
  max-no-exposure: 500.0
  max-net-exposure: 300.0
  inventory-penalty-k: 0.3
  inventory-min-scale: 0.15
  rebalance-bias-enabled: true
  min-order-size: 5
  max-order-size: 25
  size-scale-volatile: 0.5
  size-scale-crisis: 0.0
  size-scale-normal: 0.8
  size-scale-calm: 1.0
  min-active-markets: 2
  quote-aggressiveness: 0.65
  cycle-summary-interval: 15
  stale-order-timeout-sec: 30
  # Market Guard (classification + penalties + strong cooldowns)
  guard-fills-share-threshold: 0.35
  guard-max-consecutive-negative: 6
  guard-soft-cooldown-cycles: 100
  guard-hard-cooldown-cycles: 200
  guard-quality-snapshot-interval: 15
  guard-winner-min-fills-5m: 2
  guard-max-penalty-winner: 0.10
  guard-winner-churn-override-stale: 0.92
  guard-min-fills-for-classification: 2
  guard-toxic-rate-classification: 0.34
  guard-toxic-rate-hard-cooldown: 0.34
  guard-churn-stale-rate-5m: 0.88
  guard-churn-min-stale-events-5m: 8
  guard-churn-max-fills-5m: 2
  guard-loser-pnl-5m-threshold: -0.03
  guard-penalty-base-winner: 0.0
  guard-penalty-base-neutral: 0.03
  guard-penalty-base-loser: 0.12
  guard-penalty-base-toxic: 0.45
  guard-penalty-base-high-churn: 0.10
  guard-loss-penalty-k: 2.5
  guard-toxicity-penalty-extra: 0.25
  guard-toxicity-penalty-k: 0.35
  guard-churn-penalty-k: 0.22
  guard-concentration-share-soft: 0.28
  guard-concentration-penalty-k-loss: 0.55
  guard-concentration-penalty-k-winner: 0.12
  guard-hard-cooldown-pnl-5m-threshold: -0.02
  guard-extreme-churn-stale-5m: 0.92
  guard-extreme-churn-min-stale: 10
  guard-soft-cooldown-pnl-5m-threshold: -0.08
  guard-soft-cooldown-min-fills-5m: 5
  guard-disabled-session-pnl-threshold: -0.50
  guard-disabled-min-session-fills: 15


trading:
  max-capital-share-per-market: 0.25
  regime-penalty-calm: 1.0
  regime-penalty-normal: 0.8
  regime-penalty-volatile: 0.35
  regime-penalty-crisis: 0.0
  block-volatile-markets: false
  cooldown-cycles: 15
  min-edge-after-penalty: 0.3
  max-yes-exposure: 500.0
  max-no-exposure: 500.0
  max-net-exposure: 300.0
  snapshot-interval: 15
  top-markets: 5
